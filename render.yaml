services:
  - type: web
    name: polla-hipica-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
    autoDeploy: true

databases:
  - name: polla-db
    databaseName: polla_db
    user: polla_user
    plan: free
    ipAllowList: []

  - name: polla-redis
    plan: free
