<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Polla TV - Transmisiones</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0c10;
      color: #ffffff;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: rgba(46, 204, 113, 0.8);
    }

    .player-container {
      background: #000;
      position: relative;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      min-height: 60vh;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      width: 100%;
      height: 60vh;
      border: none;
      object-fit: cover;
    }

    .channel-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 40px;
      z-index: 10;
      border-left: 3px solid #2ecc71;
    }

    .channel-name {
      font-size: 18px;
      font-weight: 700;
    }

    .channel-category {
      font-size: 12px;
      color: #2ecc71;
      margin-top: 4px;
    }

    .channels-container {
      padding: 24px;
      background: #0a0c10;
    }

    .channels-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .channels-header h2 {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channels-header h2 i {
      color: #2ecc71;
    }

    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .channel-card {
      background: #1a1d25;
      border: 1px solid #2a2d35;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-card:hover {
      transform: translateY(-3px);
      border-color: #2ecc71;
      background: #1e2129;
    }

    .channel-card.active {
      border-color: #2ecc71;
      background: rgba(46, 204, 113, 0.1);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
    }

    .channel-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .channel-info {
      flex: 1;
    }

    .channel-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .channel-tag {
      font-size: 11px;
      color: #8a8f9e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .channel-badge {
      background: #2ecc71;
      color: #0a0c10;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }

    .loading-spinner {
      text-align: center;
      padding: 40px;
      color: #8a8f9e;
    }

    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      background: #1a1d25;
      border-left: 3px solid;
      font-size: 13px;
      animation: slideIn 0.2s ease;
    }
    .toast-success { border-left-color: #2ecc71; }
    .toast-error { border-left-color: #e74c3c; }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #8a8f9e;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 768px) {
      .channels-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
      .video-wrapper iframe,
      .video-wrapper video {
        height: 40vh;
      }
      .channel-overlay {
        bottom: 10px;
        left: 10px;
        padding: 8px 12px;
      }
      .channel-name {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    <i class="fas fa-arrow-left"></i> Volver al Dashboard
  </button>

  <div class="player-container">
    <div class="video-wrapper" id="videoWrapper">
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-pulse"></i> Cargando...
      </div>
    </div>
    <div class="channel-overlay" id="channelOverlay" style="display: none;">
      <div class="channel-name" id="currentChannelName">-</div>
      <div class="channel-category" id="currentChannelCategory">-</div>
    </div>
  </div>

  <div class="channels-container">
    <div class="channels-header">
      <h2><i class="fas fa-tv"></i> Canales disponibles</h2>
    </div>
    <div class="channels-grid" id="channelsGrid">
      <!-- Canales se cargarán aquí -->
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // ==================== 📺 EDITAR CANALES AQUÍ 📺 ====================
// Agrega o modifica canales en este array
// Formato: { id, name, category, url, type, icon }

const channels = [
  {
    id: 1,
    name: "ESPN 3",
    category: "Deportes",
    url: "https://rm8zcvk3.fubohd.com/espn3/mono.m3u8?token=dc825a8320dec287b96603b4d6e1dcd474454fb8-9a-1778646617-1778628617",
    type: "m3u8",
    icon: "⚽"
  },
  {
    id: 2,
    name: "TNT SPORTS",
    category: "DEPORTES",
    url: "https://smjt9q.envivoslatam.org/tntsports/tracks-v1a1/mono.m3u8?ip=38.247.4.11&token=b1b20f3c9d51e4dcb2b338c09276587e27352f10-97-1778675461-1778621461",
    type: "m3u8",
    icon: "⚽"
  }
  // 👇 Agrega más canales aquí, separados por comas
];
      // 👇 Agrega más canales aquí, separados por comas
      // {
      //   id: 2,
      //   name: "Nuevo Canal",
      //   category: "Categoría",
      //   url: "https://ejemplo.com/video.m3u8",
      //   type: "m3u8",
      //   icon: "📺"
      // }
    //];
    
    // ==================== FIN DE LA EDICIÓN ====================
    
    let currentChannel = null;
    let hlsInstance = null;

    // Renderizar canales
    function renderChannels() {
      const grid = document.getElementById('channelsGrid');
      if (!channels.length) {
        grid.innerHTML = '<div class="empty-state">No hay canales disponibles</div>';
        return;
      }
      
      grid.innerHTML = channels.map(channel => `
        <div class="channel-card ${currentChannel?.id === channel.id ? 'active' : ''}" onclick="playChannel(${channel.id})">
          <div class="channel-icon">${channel.icon || '📺'}</div>
          <div class="channel-info">
            <div class="channel-title">${escapeHtml(channel.name)}</div>
            <div class="channel-tag">${escapeHtml(channel.category) || 'Directo'}</div>
          </div>
          ${channel.type === 'm3u8' ? '<div class="channel-badge">HLS</div>' : ''}
        </div>
      `).join('');
    }

    // Reproducir canal
    function playChannel(channelId) {
      const channel = channels.find(c => c.id === channelId);
      if (!channel) return;
      
      currentChannel = channel;
      
      // Actualizar overlay
      document.getElementById('currentChannelName').textContent = channel.name;
      document.getElementById('currentChannelCategory').textContent = channel.category || 'En vivo';
      document.getElementById('channelOverlay').style.display = 'block';
      
      const wrapper = document.getElementById('videoWrapper');
      
      // Destruir instancia HLS anterior si existe
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      
      if (channel.type === 'youtube') {
        wrapper.innerHTML = `<iframe src="${channel.url}?autoplay=1&controls=1" allowfullscreen></iframe>`;
      } else if (channel.type === 'm3u8') {
        wrapper.innerHTML = `<video id="hlsVideo" controls autoplay style="width:100%; height:60vh;"></video>`;
        setTimeout(() => {
          const video = document.getElementById('hlsVideo');
          if (video && Hls && Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(channel.url);
            hlsInstance.attachMedia(video);
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
          }
        }, 100);
      } else {
        wrapper.innerHTML = `<video src="${channel.url}" controls autoplay style="width:100%; height:60vh;"></video>`;
      }
      
      renderChannels();
      showToast(`Cambiando a: ${channel.name}`, 'success');
    }

    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Inicializar
    renderChannels();
    if (channels.length > 0) {
      playChannel(channels[0].id);
    }
  </script>
</body>
</html>
