<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Polla Hípica - TV en Vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0c10;
      color: #ffffff;
    }

    .header {
      background: #1a1d25;
      border-bottom: 1px solid #2a2d35;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: #2ecc71;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #0a0c10;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-link {
      background: none;
      border: none;
      color: #8a8f9e;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: #ffffff;
      background: #252832;
    }

    .tv-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .player-section {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
      position: relative;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .channel-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      z-index: 10;
    }

    .channel-name {
      font-size: 18px;
      font-weight: 600;
    }

    .channel-category {
      font-size: 12px;
      color: #2ecc71;
    }

    .channels-section {
      background: #1a1d25;
      border-radius: 20px;
      border: 1px solid #2a2d35;
      overflow: hidden;
    }

    .channels-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2d35;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .channels-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0a0c10;
      border: 1px solid #2a2d35;
      border-radius: 40px;
      padding: 8px 16px;
    }

    .search-box i {
      color: #8a8f9e;
    }

    .search-box input {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      outline: none;
      width: 200px;
    }

    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .channel-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #0a0c10;
      border: 1px solid #2a2d35;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .channel-card:hover {
      border-color: #2ecc71;
      background: #1a1d25;
    }

    .channel-card.active {
      border-color: #2ecc71;
      background: rgba(46, 204, 113, 0.1);
    }

    .channel-logo {
      width: 48px;
      height: 48px;
      background: #252832;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .channel-card-info {
      flex: 1;
    }

    .channel-card-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .channel-card-category {
      font-size: 11px;
      color: #8a8f9e;
    }

    .channel-badge {
      background: #2ecc71;
      color: #0a0c10;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }

    /* Admin badge */
    .admin-badge {
      background: #e74c3c;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 12px;
    }

    .add-channel-btn {
      background: #2ecc71;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      color: #0a0c10;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      display: none;
    }

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1d25;
      border: 1px solid #2a2d35;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      z-index: 1001;
      display: none;
    }

    .modal.active,
    .modal-overlay.active {
      display: block;
    }

    .modal-content {
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2d35;
    }

    .modal-header h3 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #8a8f9e;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #8a8f9e;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      background: #0a0c10;
      border: 1px solid #2a2d35;
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #2ecc71;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #0a0c10;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #27ae60;
    }

    .admin-only {
      display: none;
    }

    @media (max-width: 768px) {
      .tv-container {
        padding: 16px;
      }
      .channels-grid {
        grid-template-columns: 1fr;
      }
      .channels-header {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
    <div class="logo-icon">
        <i class="fas fa-horse-head"></i>
    </div>
    <span class="logo-text">Polla TV</span>
</div>
    <div class="nav-links">
      <button class="nav-link" onclick="window.location.href='dashboard.html'">Dashboard</button>
      <button class="nav-link active">TV en Vivo</button>
      <button class="nav-link" onclick="window.location.href='index.html'">Salir</button>
    </div>
  </header>

  <div class="tv-container">
    <!-- Reproductor -->
    <div class="player-section">
      <div class="video-wrapper" id="videoWrapper">
        <iframe id="playerFrame" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0" allowfullscreen></iframe>
      </div>
      <div class="channel-info">
        <div class="channel-name" id="currentChannelName">Canal de Bienvenida</div>
        <div class="channel-category" id="currentChannelCategory">Hípica</div>
      </div>
    </div>

    <!-- Canales -->
    <div class="channels-section">
      <div class="channels-header">
        <h2><i class="fas fa-tv"></i> Canales disponibles</h2>
        <div style="display: flex; gap: 12px;">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar canal...">
          </div>
          <button class="add-channel-btn admin-only" id="addChannelBtn">
            <i class="fas fa-plus"></i> Agregar canal
          </button>
        </div>
      </div>
      <div class="channels-grid" id="channelsGrid"></div>
      <div id="adminNotice" class="admin-only" style="padding: 12px 20px; background: rgba(46,204,113,0.1); border-top: 1px solid #2a2d35; font-size: 12px; color: #2ecc71;">
        <i class="fas fa-shield-alt"></i> Modo administrador activado - Puedes agregar/editar canales
      </div>
    </div>
  </div>

  <!-- Modal agregar canal (solo admin) -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="addChannelModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Agregar canal</h3>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      <div class="form-group">
        <label>Nombre del canal</label>
        <input type="text" id="channelName" placeholder="Ej: Canal Hípica">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="channelCategory">
          <option value="Hípica">Hípica / Carreras</option>
          <option value="Deportes">Deportes</option>
          <option value="Noticias">Noticias</option>
          <option value="Entretenimiento">Entretenimiento</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL del stream</label>
        <input type="text" id="channelUrl" placeholder="https://youtube.com/embed/... o link .m3u8">
      </div>
      <div class="form-group">
        <label>Tipo de stream</label>
        <select id="channelType">
          <option value="youtube">YouTube</option>
          <option value="m3u8">M3U8 (HLS)</option>
          <option value="mp4">Video MP4</option>
        </select>
      </div>
      <button class="btn-primary" id="saveChannelBtn">Guardar canal</button>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    // Verificar si el usuario es admin
    const user = JSON.parse(localStorage.getItem('pollaUser') || '{}');
    const isAdmin = user.role === 'admin';
    
    // Mostrar elementos de admin solo si es admin
    if (isAdmin) {
      document.querySelectorAll('.admin-only').forEach(el => {
        el.style.display = 'flex';
      });
      document.querySelectorAll('.admin-only').forEach(el => {
        if (el.style.display === 'flex') return;
        el.style.display = 'block';
      });
    }

    // Canales predefinidos (solo visibles para todos)
    let channels = [
      {
        id: 1,
        name: "Carreras Hípicas En Vivo",
        category: "Hípica",
        url: "https://www.youtube.com/embed/dQw4w9WgXcQ",
        type: "youtube",
        logo: "🏇"
      },
      {
        id: 2,
        name: "Canal Hípico Venezuela",
        category: "Hípica",
        url: "https://www.youtube.com/embed/dQw4w9WgXcQ",
        type: "youtube",
        logo: "🐎"
      },
      {
        id: 3,
        name: "Noticias Hípicas",
        category: "Noticias",
        url: "https://www.youtube.com/embed/dQw4w9WgXcQ",
        type: "youtube",
        logo: "📰"
      }
    ];

    let currentChannel = null;

    // Cargar canales desde localStorage (solo admin puede agregar)
    function loadChannels() {
      if (isAdmin) {
        const saved = localStorage.getItem('tvChannels');
        if (saved) {
          channels = JSON.parse(saved);
        } else {
          localStorage.setItem('tvChannels', JSON.stringify(channels));
        }
      }
      renderChannels();
    }

    // Guardar canales (solo admin)
    function saveChannels() {
      if (isAdmin) {
        localStorage.setItem('tvChannels', JSON.stringify(channels));
      }
    }

    // Renderizar canales
    function renderChannels() {
      const grid = document.getElementById('channelsGrid');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = channels.filter(c => 
        c.name.toLowerCase().includes(searchTerm) || 
        c.category.toLowerCase().includes(searchTerm)
      );

      grid.innerHTML = filtered.map(channel => `
        <div class="channel-card ${currentChannel?.id === channel.id ? 'active' : ''}" onclick="playChannel(${channel.id})">
          <div class="channel-logo">${channel.logo || '📺'}</div>
          <div class="channel-card-info">
            <div class="channel-card-name">${channel.name}</div>
            <div class="channel-card-category">${channel.category}</div>
          </div>
          ${channel.type === 'm3u8' ? '<span class="channel-badge">HLS</span>' : ''}
        </div>
      `).join('');
    }

    // Reproducir canal
    function playChannel(channelId) {
      const channel = channels.find(c => c.id === channelId);
      if (!channel) return;
      
      currentChannel = channel;
      
      document.getElementById('currentChannelName').textContent = channel.name;
      document.getElementById('currentChannelCategory').textContent = channel.category;
      
      const wrapper = document.getElementById('videoWrapper');
      let html = '';
      
      if (channel.type === 'youtube') {
        html = `<iframe src="${channel.url}?autoplay=1&controls=1" allowfullscreen></iframe>`;
      } else if (channel.type === 'm3u8') {
        html = `<video id="hlsVideo" controls autoplay></video>`;
        setTimeout(() => {
          const video = document.getElementById('hlsVideo');
          if (video && Hls && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(channel.url);
            hls.attachMedia(video);
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
          }
        }, 100);
      } else {
        html = `<video src="${channel.url}" controls autoplay></video>`;
      }
      
      wrapper.innerHTML = html;
      renderChannels();
    }

    // Agregar canal (solo admin)
    function addChannel() {
      if (!isAdmin) return;
      
      const name = document.getElementById('channelName').value;
      const category = document.getElementById('channelCategory').value;
      const url = document.getElementById('channelUrl').value;
      const type = document.getElementById('channelType').value;
      
      if (!name || !url) {
        showToast('Completa todos los campos', 'error');
        return;
      }
      
      const newChannel = {
        id: Date.now(),
        name,
        category,
        url,
        type,
        logo: getRandomLogo(category)
      };
      
      channels.push(newChannel);
      saveChannels();
      renderChannels();
      closeModal();
      showToast('Canal agregado correctamente', 'success');
      
      document.getElementById('channelName').value = '';
      document.getElementById('channelUrl').value = '';
    }

    function getRandomLogo(category) {
      const logos = {
        'Hípica': ['🏇', '🐎', '🏆'],
        'Deportes': ['⚽', '🏀', '🎾'],
        'Noticias': ['📰', '📺', '🎙️'],
        'Entretenimiento': ['🎬', '🎵', '🎭']
      };
      const list = logos[category] || ['📺'];
      return list[Math.floor(Math.random() * list.length)];
    }

    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function openModal() {
      if (!isAdmin) return;
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('addChannelModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('addChannelModal').classList.remove('active');
    }

    // Eventos
    document.getElementById('addChannelBtn')?.addEventListener('click', openModal);
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('modalOverlay')?.addEventListener('click', closeModal);
    document.getElementById('saveChannelBtn')?.addEventListener('click', addChannel);
    document.getElementById('searchInput')?.addEventListener('input', renderChannels);

    // Cargar HLS.js si es necesario
    const hlsScript = document.createElement('script');
    hlsScript.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
    document.head.appendChild(hlsScript);

    // Inicializar
    loadChannels();
    if (channels.length > 0) {
      playChannel(channels[0].id);
    }
  </script>

  <style>
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      background: #1a1d25;
      border-left: 3px solid;
      font-size: 13px;
      animation: slideIn 0.2s ease;
    }
    .toast-success { border-left-color: #2ecc71; }
    .toast-error { border-left-color: #e74c3c; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .admin-only {
      display: none !important;
    }
  </style>
</body>
</html>
