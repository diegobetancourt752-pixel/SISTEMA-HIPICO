<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Polla TV - Transmisiones</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0c10;
      color: #ffffff;
    }

    /* Reproductor principal */
    .player-container {
      background: #000;
      position: relative;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      min-height: 60vh;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      width: 100%;
      height: 60vh;
      border: none;
      object-fit: cover;
    }

    .channel-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 40px;
      z-index: 10;
      border-left: 3px solid #2ecc71;
    }

    .channel-name {
      font-size: 18px;
      font-weight: 700;
    }

    .channel-category {
      font-size: 12px;
      color: #2ecc71;
      margin-top: 4px;
    }

    /* Lista de canales estilo Netflix */
    .channels-container {
      padding: 24px;
      background: #0a0c10;
    }

    .channels-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .channels-header h2 {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channels-header h2 i {
      color: #2ecc71;
    }

    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .channel-card {
      background: #1a1d25;
      border: 1px solid #2a2d35;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-card:hover {
      transform: translateY(-3px);
      border-color: #2ecc71;
      background: #1e2129;
    }

    .channel-card.active {
      border-color: #2ecc71;
      background: rgba(46, 204, 113, 0.1);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
    }

    .channel-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .channel-info {
      flex: 1;
    }

    .channel-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .channel-tag {
      font-size: 11px;
      color: #8a8f9e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .channel-badge {
      background: #2ecc71;
      color: #0a0c10;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }

    /* Loading */
    .loading-spinner {
      text-align: center;
      padding: 40px;
      color: #8a8f9e;
    }

    @media (max-width: 768px) {
      .channels-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
      .video-wrapper iframe,
      .video-wrapper video {
        height: 40vh;
      }
      .channel-overlay {
        bottom: 10px;
        left: 10px;
        padding: 8px 12px;
      }
      .channel-name {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="player-container">
    <div class="video-wrapper" id="videoWrapper">
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-pulse"></i> Cargando...
      </div>
    </div>
    <div class="channel-overlay" id="channelOverlay" style="display: none;">
      <div class="channel-name" id="currentChannelName">-</div>
      <div class="channel-category" id="currentChannelCategory">-</div>
    </div>
  </div>

  <div class="channels-container">
    <div class="channels-header">
      <h2><i class="fas fa-tv"></i> Canales disponibles</h2>
    </div>
    <div class="channels-grid" id="channelsGrid">
      <!-- Canales se cargarán aquí -->
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    // ========== CANALES PREDEFINIDOS (EDITAR AQUÍ) ==========
    const channels = [
      {
        id: 1,
        name: "Carreras Hípicas",
        category: "Hípica",
        url: "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0",
        type: "youtube",
        icon: "🏇"
      },
      {
        id: 2,
        name: "NASA TV",
        category: "Ciencia",
        url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8",
        type: "m3u8",
        icon: "🚀"
      },
      {
        id: 3,
        name: "Big Buck Bunny 4K",
        category: "Prueba",
        url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
        type: "m3u8",
        icon: "🎬"
      },
      {
        id: 4,
        name: "Bloomberg TV",
        category: "Noticias",
        url: "https://bloomberg-bloomberg-1-eu.rakuten.wurl.tv/playlist.m3u8",
        type: "m3u8",
        icon: "💰"
      },
      {
        id: 5,
        name: "Sintel Demo",
        category: "Prueba",
        url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8",
        type: "m3u8",
        icon: "🎥"
      },
      {
        id: 6,
        name: "Apple Bipbop",
        category: "Prueba",
        url: "https://devstreaming-cdn.apple.com/videos/streaming/examples/bipbop_adv_example_hevc/master.m3u8",
        type: "m3u8",
        icon: "🍎"
      }
    ];

    let currentChannel = null;

    // Renderizar canales
    function renderChannels() {
      const grid = document.getElementById('channelsGrid');
      grid.innerHTML = channels.map(channel => `
        <div class="channel-card ${currentChannel?.id === channel.id ? 'active' : ''}" onclick="playChannel(${channel.id})">
          <div class="channel-icon">${channel.icon}</div>
          <div class="channel-info">
            <div class="channel-title">${channel.name}</div>
            <div class="channel-tag">${channel.category}</div>
          </div>
          ${channel.type === 'm3u8' ? '<div class="channel-badge">HLS</div>' : ''}
        </div>
      `).join('');
    }

    // Reproducir canal
    function playChannel(channelId) {
      const channel = channels.find(c => c.id === channelId);
      if (!channel) return;
      
      currentChannel = channel;
      
      // Actualizar overlay
      document.getElementById('currentChannelName').textContent = channel.name;
      document.getElementById('currentChannelCategory').textContent = channel.category;
      document.getElementById('channelOverlay').style.display = 'block';
      
      const wrapper = document.getElementById('videoWrapper');
      
      if (channel.type === 'youtube') {
        wrapper.innerHTML = `<iframe src="${channel.url}?autoplay=1&controls=1" allowfullscreen></iframe>`;
      } else if (channel.type === 'm3u8') {
        wrapper.innerHTML = `<video id="hlsVideo" controls autoplay style="width:100%; height:60vh;"></video>`;
        setTimeout(() => {
          const video = document.getElementById('hlsVideo');
          if (video && Hls && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(channel.url);
            hls.attachMedia(video);
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
          }
        }, 100);
      } else {
        wrapper.innerHTML = `<video src="${channel.url}" controls autoplay style="width:100%; height:60vh;"></video>`;
      }
      
      renderChannels();
      showToast(`Cambiando a: ${channel.name}`, 'success');
    }

    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Cargar HLS.js
    const hlsScript = document.createElement('script');
    hlsScript.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
    document.head.appendChild(hlsScript);

    // Inicializar
    renderChannels();
    if (channels.length > 0) {
      playChannel(channels[0].id);
    }
  </script>

  <style>
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      background: #1a1d25;
      border-left: 3px solid;
      font-size: 13px;
      animation: slideIn 0.2s ease;
    }
    .toast-success { border-left-color: #2ecc71; }
    .toast-error { border-left-color: #e74c3c; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</body>
</html>
